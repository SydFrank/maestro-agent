[project]
name = "agent-common"
version = "0.1.0"
description = "Shared utilities for the Agentic RAG platform (config, logging, tracing, schemas)."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "structlog>=24.1",
    "httpx>=0.27",
    "fastapi>=0.110",
    "prometheus-client>=0.20",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["agent_common*"]
