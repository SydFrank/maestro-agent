# One-command local stack for the whole platform.
#   cp .env.example .env  &&  docker compose up -d --build
#
# Build context is the repo root for every service so the shared `agent-common`
# package can be installed into each image.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-agent_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  llm-gateway:
    build:
      context: .
      dockerfile: services/llm-gateway/Dockerfile
    env_file: .env
    environment:
      SERVICE_NAME: llm-gateway
    ports:
      - "8001:8000"
    restart: unless-stopped

  rag-service:
    build:
      context: .
      dockerfile: services/rag-service/Dockerfile
    env_file: .env
    environment:
      SERVICE_NAME: rag-service
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8002:8000"
    restart: unless-stopped

  sandbox-runner:
    build:
      context: .
      dockerfile: services/sandbox-runner/Dockerfile
    env_file: .env
    environment:
      SERVICE_NAME: sandbox-runner
    ports:
      - "8004:8000"
    restart: unless-stopped

  agent-core:
    build:
      context: .
      dockerfile: services/agent-core/Dockerfile
    env_file: .env
    environment:
      SERVICE_NAME: agent-core
      LLM_GATEWAY_URL: http://llm-gateway:8000
      RAG_SERVICE_URL: http://rag-service:8000
      SANDBOX_RUNNER_URL: http://sandbox-runner:8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - llm-gateway
      - rag-service
      - sandbox-runner
      - redis
    ports:
      - "8003:8000"
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file: .env
    environment:
      SERVICE_NAME: gateway
      AGENT_CORE_URL: http://agent-core:8000
      RAG_SERVICE_URL: http://rag-service:8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - agent-core
      - redis
    ports:
      - "8080:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - gateway

volumes:
  pgdata:
